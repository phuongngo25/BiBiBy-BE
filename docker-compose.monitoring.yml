name: nutrix-monitoring

services:
  prometheus:
    image: prom/prometheus:v3.4.1
    container_name: nutrix-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "${PROMETHEUS_PORT:-19090}:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - nutrix_prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:12.0.2
    container_name: nutrix-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_DOMAIN: ${GRAFANA_DOMAIN:-grafana.bibiby.space}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-https://grafana.bibiby.space}
    volumes:
      - nutrix_grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - monitoring

  # Scrapes host machine CPU / RAM / disk / network for "Node Exporter Full" dashboard
  # Note: on Windows/WSL2, rslave bind-mount is unsupported — run without rootfs overlay.
  # CPU/memory/network metrics still work; some disk metrics will reflect WSL2 VM, not Windows host.
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: nutrix-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    networks:
      - monitoring

  # Scrapes PostgreSQL internals for "PostgreSQL Database" dashboard (ID 9628)
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: nutrix-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-your_password_here}@host.docker.internal:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-nutrix}?sslmode=disable"
    ports:
      - "9187:9187"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge

volumes:
  nutrix_prometheus_data:
  nutrix_grafana_data:
