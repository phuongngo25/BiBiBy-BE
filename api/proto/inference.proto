syntax = "proto3";

package nutrix.inference;

option go_package = "nutrix/inference/v1;inferencev1";

// ---------------------------------------------------------------------------
// NutriX Inference Service
//
// Contract:
//   - Client sends raw image bytes (NOT Base64). Binary-efficient over HTTP/2.
//   - Server returns volume estimate with confidence and request tracing ID.
//   - Max payload: 12 MB (enforced server-side; see config.py).
//   - Deadline/timeout should be set by the client (recommended: 30s).
// ---------------------------------------------------------------------------

service InferenceService {
  // Unary RPC: single image in, single volume estimate out.
  rpc EstimateVolume (EstimateVolumeRequest) returns (EstimateVolumeResponse);

  // Request a presigned URL to upload a meal image to S3
  rpc CreateUploadSession (CreateUploadSessionRequest) returns (CreateUploadSessionResponse);

  // Confirm that the client has successfully uploaded the file to S3
  rpc ConfirmUpload (ConfirmUploadRequest) returns (ConfirmUploadResponse);

  // Consolidated E2E Pipeline: Image -> CV -> Enrichment -> KG Reasoning -> Recommendation
  rpc AnalyzeMealImage (AnalyzeMealImageRequest) returns (AnalyzeMealImageResponse);
}

message CreateUploadSessionRequest {}

message CreateUploadSessionResponse {
  string upload_session_id = 1;
  string presigned_url = 2;
  int64 expires_at = 3;
}

message ConfirmUploadRequest {
  string upload_session_id = 1;
}

message ConfirmUploadResponse {
  string upload_session_id = 1;
  bool success = 2;
}

message AnalyzeMealImageRequest {
  string upload_session_id = 1;
  // Optional user context for KG reasoning (e.g. "diabetes", "hypertension")
  repeated string user_diseases = 2;
}

message AnalyzeMealImageResponse {
  string request_id = 1;
  
  // Computer Vision Output
  string food_label = 2;
  float food_label_confidence = 3;
  float volume_cm3 = 4;
  float mass_g = 5;

  // Knowledge Graph / Enrichment Output
  repeated string ingredients = 6;
  bool safe = 7;
  RiskLevel risk_level = 8;
  repeated Violation violations = 9;
  repeated Recommendation recommendations = 10;
  
  // Observability
  float latency_ms = 11;

  // Reasoning
  repeated EvidencePath evidence_paths = 12;
}

enum RiskLevel {
  RISK_UNKNOWN = 0;
  RISK_SAFE = 1;
  RISK_WARNING = 2;
  RISK_CRITICAL = 3;
}

message EvidencePath {
  repeated string nodes = 1;
}

message Violation {
  string disease_id = 1;
  string disease_name = 2;
  string severity = 3;
  string explanation = 4;
}

message Recommendation {
  string food_id = 1;
  string food_name = 2;
  float score = 3;
  string reason = 4;
}

message EstimateVolumeRequest {
  // Raw image bytes (JPEG/PNG). Do NOT Base64-encode.
  // Server will reject payloads exceeding the configured limit.
  bytes image_data = 1;
}

// One candidate dish from the classifier's top-K softmax distribution.
// Used to let the user pick from several likely dishes instead of forcing top-1.
message FoodPrediction {
  // Normalized classification label (e.g., "pho", "com_tam").
  string food_label = 1;

  // Softmax probability for this candidate [0.0, 1.0].
  float confidence = 2;

  // Estimated mass in grams for THIS candidate (shared volume × per-class density).
  // Mass differs per candidate in legacy density mode; identical across candidates
  // in direct-mass mode. 0 when density for the label is unknown.
  float mass_g = 3;
}

message EstimateVolumeResponse {
  // Server-generated request ID for end-to-end tracing.
  string request_id = 1;

  // Estimated food volume in cubic centimeters (cm³).
  float volume_cm3 = 2;

  // Model confidence score for the volume estimation [0.0, 1.0].
  float volume_confidence = 3;

  // Total server-side latency for this request in milliseconds.
  float latency_ms = 4;

  // Food classification label (e.g., "pho", "com_tam").
  string food_label = 5;

  // Classifier confidence score [0.0, 1.0].
  float food_label_confidence = 6;

  // Estimated food mass in grams (g) = volume * density.
  float mass_g = 7;

  // Density used for mass calculation (g/cm³).
  float density_g_cm3 = 8;

  // Explicit flags for presence (replaces 'optional' for cross-lang stability).
  bool has_mass = 9;
  bool has_density = 10;

  // Tracking where the density came from (e.g. "manual_registry", "unknown_food").
  string density_source = 11;

  // Component versions for observability and debugging.
  string classifier_version = 12;
  string volume_version = 13;
  string density_version = 14;

  // Top-K classifier candidates (sorted descending by confidence).
  // food_label/food_label_confidence above remain the top-1 for backward compat.
  repeated FoodPrediction food_predictions = 15;
}
