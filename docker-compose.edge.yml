name: nutrix-edge

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: nutrix-edge-nginx
    restart: unless-stopped
    ports:
      - "${NUTRIX_EDGE_PORT:-8090}:80"
    volumes:
      - ../NutriX/build/web:/usr/share/nginx/html:ro
      - ./nginx/nutrix.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "nutrix-host:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
